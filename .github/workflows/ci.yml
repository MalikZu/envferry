name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: Typecheck, build & test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Lowest supported (engines: >=20) and current LTS.
        node: ["20", "22"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      # typecheck + build + test (against the built artifact) + smoke + pack dry-run
      - run: npm run check
