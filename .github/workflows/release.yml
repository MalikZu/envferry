name: Release

# Publishes on a version tag (or manual dispatch with a tag). Uses npm trusted
# publishing (OIDC) — no long-lived npm token is stored, and provenance is
# generated automatically for the public package.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish, matching package.json version (e.g. v0.1.0)"
        required: true

# A release publishes; never cancel one mid-flight.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # create the GitHub release
  id-token: write # OIDC for npm trusted publishing + provenance

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: npm
    env:
      TAG: ${{ inputs.tag || github.ref_name }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      # Node 24 ships an npm new enough for trusted publishing (>= 11.5.1).
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Verify tag matches package version
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          test "v${VERSION}" = "$TAG" || { echo "tag $TAG != v$VERSION"; exit 1; }

      - run: npm ci
      - run: npm run check

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public

      - name: Create GitHub release
        run: |
          # Hyphenated SemVer tags (e.g. v0.1.0-rc.1) publish as GitHub
          # pre-releases so they're flagged and excluded from "Latest release".
          PRERELEASE=""
          case "$TAG" in *-*) PRERELEASE="--prerelease" ;; esac
          gh release create "$TAG" \
            --title "envferry ${TAG}" \
            --generate-notes \
            $PRERELEASE

  homebrew:
    name: Bump Homebrew formula
    needs: publish
    runs-on: ubuntu-latest
    # Stable tags only; pre-releases (v0.1.0-rc.1) don't update the formula.
    if: ${{ !contains(inputs.tag || github.ref_name, '-') }}
    env:
      TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Render formula from the published tarball and push to the tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${TAG#v}"
          URL="https://registry.npmjs.org/envferry/-/envferry-${VERSION}.tgz"
          # The tarball can take a moment to be fetchable right after publish.
          for _ in $(seq 1 10); do
            curl -fsSL "$URL" -o pkg.tgz && break || sleep 15
          done
          SHA="$(shasum -a 256 pkg.tgz | cut -d' ' -f1)"
          sed -e "s|__URL__|${URL}|" -e "s|__SHA__|${SHA}|" \
            packaging/homebrew/envferry.rb > formula.rb

          git clone "https://x-access-token:${GH_TOKEN}@github.com/MalikZu/homebrew-tap.git" tap
          mkdir -p tap/Formula
          mv formula.rb tap/Formula/envferry.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/envferry.rb
          git commit -m "envferry ${VERSION}"
          git push
